# mainled macros defined in options/led/*

[force_move]
enable_force_move: True

[gcode_macro _global_var]
variable_pause_park:{'x': 0, 'y': 0, 'z': 10, 'e': 1}
variable_cancel_park:{'x': 0, 'y': 350, 'z': 10, 'e': 1}
variable_z_maximum_lifting_distance: 345
variable_pause_resume_travel_speed: 150
variable_bed_mesh_calibrate_target_temp: 90
variable_load_filament_extruder_temp: 250
gcode:

[gcode_macro START_PRINT]
description: Start printing sequence
variable_state: 'Prepare'
variable_record_extruder_temp: 0
variable_max_record_extruder_temp: 0

gcode:
    {% set speed = printer.configfile.settings.printer.max_velocity %}
    {% set x_max = printer.toolhead.axis_maximum.x %}
    {% set y_max = printer.toolhead.axis_maximum.y %}
    {% set hotendtemp = params.EXTRUDER_TEMP|default(230)|int %}
    {% set bedtemp = params.BED_TEMP|default(60)|int %}

    M400
    CLEAR_PAUSE
    G90

    {% if state == 'Prepare' %}
        {action_respond_info("Prepare!")}

        {% if printer.toolhead.homed_axes|lower != "xyz" %}
            G28
        {% endif %}

        {% if printer['filament_switch_sensor filament_sensor'].enable == True and
              printer['filament_switch_sensor filament_sensor'].filament_detected != True %}
            M117 No filament!
            {action_respond_info("Please Insert filament in Sensor!")}
            CANCEL_PRINT
        {% endif %}

        {action_respond_info("Check Heating!")}

        ; Нагрев только стола
        M140 S{bedtemp}
        
        {% if printer.heater_bed.temperature < bedtemp %}
            M117 Bed heating...
            {action_respond_info("Bed heating...")}
            M190 S{bedtemp}
        {% endif %}

        {% if printer.quad_gantry_level.applied|lower != 'true' %}
            QUAD_GANTRY_LEVEL
        {% endif %}

        ; Нагрев сопла только до температуры чистки (150°C)
        M117 Nozzle heating for cleaning...
        {action_respond_info("Nozzle heating for cleaning...")}
        M104 S150
        M109 S150

        ; Position for cleaning
        G0 X352 Y360 Z15 F6000

        ; 🧼 Nozzle Cleaning
        M117 Nozzle Cleaning
        CLEAN_NOZZLE_TAP

        ; 🔽 TAP Z Probing
        M117 Eddy Tap
        PROBE_EDDY_NG_TAP #TARGET_Z=-0.350 THRESHOLD=1000

        ; 🧭 Adaptive Mesh
        M117 Bed Mesh
        BED_MESH_CALIBRATE ADAPTIVE=1 METHOD=rapid_scan

        ; 🔧 Skew Correction
        SET_SKEW XY=141.27,140.00,99.94

        ; ✅ Подъём
        G91
        G1 Z10 F600      ; Поднять на 10мм относительно
        G90
        
        ; ⭐ SMART PARK - перемещение к области печати перед финальным нагревом
        SMART_PARK
        
        ; Финальный нагрев до рабочей температуры
        M117 Final Nozzle Heating!
        {action_respond_info("Final nozzle heating...")}
        M104 S{hotendtemp} ; set extruder temp
        M109 S{hotendtemp} ; wait for extruder temp
        
        ; Adaptive prime lime
        M117 Primering
        LINE_PURGE
        
        SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=state VALUE='"Start"' 
        UPDATE_DELAYED_GCODE ID=_print_start_wait DURATION=0.5

    {% elif state == 'Start' %}
        M117 Printing now!!!
        {action_respond_info("Start!")}
    {% endif %}

[gcode_macro END_PRINT]
description: 
variable_state: 'normal'
gcode:
    {% set z_max = printer['gcode_macro _global_var'].z_maximum_lifting_distance|int %}
    {% set e_mintemp  = printer.configfile.settings['extruder'].min_extrude_temp %}
    
    ; ОТКЛЮЧЕНИЕ КОРРЕКЦИИ ПЕРЕКОСА ПЕРЕД ВЫКЛЮЧЕНИЕМ ДВИГАТЕЛЕЙ
    SET_SKEW CLEAR=1

    PROBE_EDDY_NG_SET_TAP_OFFSET VALUE=0
    
    M400
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=state VALUE='"Prepare"'
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=record_extruder_temp VALUE=0  
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=max_record_extruder_temp VALUE=0

    M117 Print Finished!
    G91
    {% if printer['filament_switch_sensor filament_sensor'].enable == True and
          printer['filament_switch_sensor filament_sensor'].filament_detected == True
    %}
        {% if (printer.extruder.target != 0 and printer.extruder.temperature >= printer.extruder.target) or
              printer.extruder.temperature >= e_mintemp
        %}
            G1 E-2 F2700
            G1 E-2 Z0.2 F2400
        {% endif %}
    {% endif %}

    {% if (printer.gcode_move.position.z + 10) < z_max %}
        G1 Z+10 F3000
    {% else %}
        G1 Z+{(z_max - printer.gcode_move.position.z)} F3000
    {% endif %}
    G90
    G1 X0 Y360 F9000

    
    ; ОТКЛЮЧЕНИЕ КОРРЕКЦИИ ПЕРЕКОСА ПЕРЕД ВЫКЛЮЧЕНИЕМ ДВИГАТЕЛЕЙ
    SET_SKEW CLEAR=1

    _ALL_FAN_OFF
    TURN_OFF_HEATERS

    M84 X Y Z E  

    M220 S100
    M221 S100

    CLEAR_PAUSE

    {action_respond_info("Finish Print!")}

[gcode_macro _IDLE_TIMEOUT]
gcode:
    {% if printer.print_stats.state == "paused" %}
      RESPOND TYPE=echo MSG="No operations in 10min!"
    {% else %}
     M84
     TURN_OFF_HEATERS
    {% endif %}

[gcode_macro CLEAN_NOZZLE_TAP]
description: "Clean nozzle by wiping on brush - customizable"
variable_brush_start_x: 319
variable_brush_end_x: 354
variable_brush_y: 359
variable_brush_z: 0.4 # edit this i use 0.5 i have set it to 1 to be safe
variable_end_x: 200
variable_end_y: 100
variable_end_z: 5
variable_wipe_repeat: 5
variable_zigzag_repeat: 3

gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28 ; Home all axes if needed
    {% endif %}

    G90 ; Absolute positioning
    M117 Cleaning nozzle...

    G1 X{brush_start_x} Y{brush_y} F9000
    G1 Z{brush_z} F300

    {% for i in range(wipe_repeat) %}
        G1 X{brush_end_x} F4500
        G1 X{brush_start_x}
    {% endfor %}

    G1 Z{brush_z + 4}
    G1 X{brush_start_x} Y{brush_y - 4} F6000
    G1 Z{brush_z}

    {% set x = brush_start_x %}
    {% set step = 2 %}
    {% for i in range(zigzag_repeat) %}
        G1 Y{brush_y} X{x + step}
        G1 Y{brush_y - 3} X{x + step + 2}
        G1 Y{brush_y} X{x + step + 4}
        G1 Y{brush_y - 3} X{x + step + 6}
        G1 Y{brush_y} X{x + step + 8}
    {% endfor %}

    G1 X{end_x} Y{end_y} Z{end_z} F6000

[delayed_gcode exhaust_fan_off]
gcode:
    SET_FAN_SPEED FAN=exhaust_fan SPEED=0

[gcode_macro _ALL_FAN_OFF]
gcode:
    M106 S0
    # Run the exhaust fan for another 2min after the other fans and then turn it off
    # UPDATE_DELAYED_GCODE ID=exhaust_fan_off DURATION=120
    M107

# Bring the nozzle to the center of the bed
[gcode_macro CENTER]
gcode:
    G0  X175 Y175 F5000

[delayed_gcode TEST_BELT]
initial_duration: 0.3
gcode:
    {% set x_freq = printer.save_variables.variables.x_freq|float %}
    {% set y_freq = printer.save_variables.variables.y_freq|float %}
    {% set show_freq = printer.save_variables.variables.show_freq %}
    {% if show_freq == 1 %}
        M117 x {x_freq}, y {y_freq}
        SAVE_VARIABLE VARIABLE=show_freq VALUE=0
    {% endif %}

[gcode_macro QUAD_GANTRY_LEVEL]
rename_existing: _QUAD_GANTRY_LEVEL
gcode:
    SAVE_GCODE_STATE NAME=STATE_QGL
    BED_MESH_CLEAR
    # If QGL has not been done yet, correct for any major skew first
    # at 8mm height
    {% if not printer.quad_gantry_level.applied %}
    _QUAD_GANTRY_LEVEL horizontal_move_z=6 retry_tolerance=1      
    {% endif %}
    # Complete with a full QGL at the configured height
    _QUAD_GANTRY_LEVEL
    RESTORE_GCODE_STATE NAME=STATE_QGL


[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE
gcode:
    {% set mesh_name = "default" %}

    {action_respond_info("Starting bed mesh calibration without temperature check")}

    {% if printer.toolhead.homed_axes|lower != "xyz" %}
        G28
    {% endif %}
    
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE_BASE ADAPTIVE=1 METHOD=rapid_scan

    {action_respond_info("Bed mesh calibration completed")}

[gcode_macro G34]
gcode:
    BED_MESH_CLEAR 
    {% if printer.toolhead.homed_axes|lower != "xyz" %}
      G28
    {% else %}
      G28 Z
    {% endif %}
    QUAD_GANTRY_LEVEL 
    G28 Z 
    G0 X175 Y175 Z30 F3600

[delayed_gcode bed_mesh_init]
initial_duration: .01
gcode:
    BED_MESH_PROFILE LOAD=default

[delayed_gcode _print_start_wait]
gcode:
    {% if printer['gcode_macro START_PRINT'].state == 'Heating'%}
        {action_respond_info("Prepare->Heating!")}
    {% elif printer['gcode_macro START_PRINT'].state == 'Start' %}
        {action_respond_info("Heating->Start!")}
    {% endif %}

    {% if printer['gcode_macro START_PRINT'].execute|lower != 'false' %}
        START_PRINT
    {% endif %}


[gcode_macro CANCEL_PRINT]
description: 
rename_existing: CANCEL_PRINT_BASE
gcode:
    ; ОТКЛЮЧЕНИЕ КОРРЕКЦИИ ПЕРЕКОСА ПОСЛЕ ПАРКОВКИ
    SET_SKEW CLEAR=1
    
    {% set x_park = printer['gcode_macro _global_var'].cancel_park.x|float %}
    {% set y_park = printer['gcode_macro _global_var'].cancel_park.y|float %}
    {% set z_park = printer['gcode_macro _global_var'].cancel_park.z|float %}
    {% set z_lift_max = printer['gcode_macro _global_var'].z_maximum_lifting_distance %}
    {% set e_restract = printer['gcode_macro _global_var'].cancel_park.e|float %}
    {% set e_mintemp  = printer.configfile.settings['extruder'].min_extrude_temp %}

    CANCEL_PRINT_BASE

    M117 Print canceled!
    G91
    {% if printer['filament_switch_sensor filament_sensor'].enabled == True and 
          printer['filament_switch_sensor filament_sensor'].filament_detected == True
    %}
        {% if (printer.extruder.target != 0 and printer.extruder.temperature >= printer.extruder.target) or
              printer.extruder.temperature >= e_mintemp
        %}
            G1 E-{e_restract} F500
        {% else %}
            {action_respond_info("Nozzle not hot enough")}
        {% endif %}
    {% endif %}

    {%if (printer.gcode_move.position.z + 10) < z_lift_max %}
        G1 Z+10 F3000
    {% else %}
        G1 Z+{(z_lift_max - printer.gcode_move.position.z)} F3000
    {% endif %}
        G90
        G1 X{x_park} Y{y_park} F9000

    TURN_OFF_HEATERS
    _ALL_FAN_OFF

    CLEAR_PAUSE
    M84 X Y Z E

    M117 Ready
    {action_respond_info("Cancel Print Success!")}
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=state VALUE='"Prepare"'
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=record_extruder_temp VALUE=0  
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=max_record_extruder_temp VALUE=0


[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
variable_state: 'normal'
gcode:
    {% if printer.pause_resume.is_paused == False %}
        {% set x_park = printer['gcode_macro _global_var'].pause_park.x|float %}
        {% set y_park = printer['gcode_macro _global_var'].pause_park.y|float %}
        {% set e_restract = printer['gcode_macro _global_var'].pause_park.e|float %}
        {% set z_lift_max = printer['gcode_macro _global_var'].z_maximum_lifting_distance %}

        {% set state = params.STATE if 'filament_change' in params.STATE else 'normal' %}
        
        {action_respond_info("Pause Print!")}
        
        PAUSE_BASE
        M117 Pause Print!!!
        G91
        {% if (printer.gcode_move.position.z + 5) < z_lift_max %}
            G1 Z+5 F3000
        {% else %}
            G1 Z+{(z_lift_max - printer.gcode_move.position.z)} F3000
        {% endif %}
        G90
        {% if printer.gcode_move.position.x != x_park and
                printer.gcode_move.position.y != y_park     
        %}
            G1 X{x_park} Y{y_park} F{printer["gcode_macro _global_var"].pause_resume_travel_speed * 60}
        {% endif %}

        M104 S{printer.extruder.target}
    
        {% if state == 'normal' %}
            {% if (printer.extruder.temperature + 5 >= printer.extruder.target) and (printer.extruder.temperature >= printer.configfile.settings['extruder'].min_extrude_temp) %}
                {% if printer['filament_switch_sensor filament_sensor'].enabled == True and 
                    printer['filament_switch_sensor filament_sensor'].filament_detected == True
                %}
                    G91
                    G1 E-{e_restract} F300
                    G90
                {% elif printer['filament_switch_sensor filament_sensor'].enabled == True and 
                        printer['filament_switch_sensor filament_sensor'].filament_detected != True %}
                    G91
                    G1 E+95 F300
                    G1 E-10 F1500
                    G1 E-20 F600
                    M400
                    G4 P3000
                    G1 E-50 F300 
                    G90
                {% endif %}
            {% endif %}
        {% elif state == 'filament_change' %}
            {% if (printer.extruder.temperature + 5 >= printer.extruder.target) and (printer.extruder.temperature >= printer.configfile.settings['extruder'].min_extrude_temp) %}
                G91
                G1 E+25 F300
                G1 E-10 F1500
                G1 E-20 F600
                M400
                G4 P3000
                G1 E-50 F300 
                G90
            {% endif %}
        {% endif %}
    {% endif %}


[delayed_gcode _resume_wait]
gcode:
    {% if printer['gcode_macro RESUME'].execute|lower != 'false' %}
        RESUME
    {% endif %}


[gcode_macro RESUME]
description: Pause the actual running print
rename_existing: RESUME_BASE
variable_state: 'normal'
gcode:
    {% set e_restract = printer['gcode_macro _global_var'].pause_park.e|float %}
    {% set EXTRUDER_TEMP = printer.extruder.target|int %}

    {% set state = params.STATE if 'filament_change' in params.STATE else 'normal' %}

    {% if state == 'filament_change' %}
        {% if printer["filament_switch_sensor filament_sensor"].enable == True and
              printer["filament_switch_sensor filament_sensor"].filament_detected != True
        %}
            {action_respond_info("Please Insert filament in Sensor!")}
        {% else %}
            {% if printer.extruder.temperature + 5 >= printer.extruder.target %}
                G91
                G1 E30 F300
                G1 E10 F150
                G90
            {% else %}
                M104 S{EXTRUDER_TEMP}
                {action_respond_info("Nozzle not hot enough!")}
                {action_respond_info("Nozzle heating...")}
                M109 S{EXTRUDER_TEMP}
                G91
                G1 E30 F300
                G1 E10 F150
                G90
            {% endif %}
            {action_respond_info("Print resumming!")}
            RESUME_BASE
        {% endif %}
    {% elif state == 'normal' %}
        {% if printer['filament_switch_sensor filament_sensor'].enable != True and
              printer['filament_switch_sensor filament_sensor'].filament_detected != True
        %}
            {action_respond_info("Please Insert filament in Sensor!")}
        {% else %}
            {action_respond_info("Print resumming!")}
            G91
            G1 E{e_restract} F300
            G90
            M117 Printing now!!!
            RESUME_BASE
        {% endif %}
    {% endif %}


[gcode_macro LOAD_FILAMENT]
gcode:
    {% set extruder_temp = printer['gcode_macro _global_var'].load_filament_extruder_temp|int %}
    {% set current_target_temp  = printer.extruder.target|int %}

    {% if printer.print_stats.state != "printing" %}
        {% if printer.print_stats.state != "paused" %}
            M104 S{extruder_temp}
            M117 Nozzle heating...
            {action_respond_info("Nozzle not hot enough!")}
            {action_respond_info("Nozzle heating...")}
            M109 S{extruder_temp}
        {% else %}
            {% if printer.extruder.target == 0 %}
                M104 S{extruder_temp}
                M117 Nozzle heating...
                {action_respond_info("Nozzle not hot enough!")}
                {action_respond_info("Nozzle heating...")}
                M109 S{extruder_temp}
            {% else %}
                M104 S{printer.extruder.target}
                M117 Nozzle heating...
                {action_respond_info("Nozzle not hot enough!")}
                {action_respond_info("Nozzle heating...")}
                M109 S{printer.extruder.target}
            {% endif %}
        {% endif %}
        M117 Extruding...
        G91 
        G1 E45 F300
        G1 E30 F150
        G90
        M400
        M117 Extrude Finish
        M400
        {% if current_target_temp == 0 or printer.print_stats.state != "paused"%}
            M104 S0
        {% endif %}
    {% else %}
        {action_respond_info("Don't load filament during printing!!!")}
    {% endif %}

    
[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set extruder_temp = printer['gcode_macro _global_var'].load_filament_extruder_temp|int %}
    {% set current_target_temp  = printer.extruder.target|int %}

    {% if printer.print_stats.state != "printing" %}
        {% if printer.print_stats.state != "paused" %}
            M104 S{extruder_temp}
            M117 Nozzle heating...
            {action_respond_info("Nozzle not hot enough!")}
            {action_respond_info("Nozzle heating...")}
            M109 S{extruder_temp}
        {% else %}
            {% if printer.extruder.target == 0 %}
                M104 S{extruder_temp}
                M117 Nozzle heating...
                {action_respond_info("Nozzle not hot enough!")}
                {action_respond_info("Nozzle heating...")}
                M109 S{extruder_temp}
            {% else %}
                M104 S{printer.extruder.target}
                M117 Nozzle heating...
                {action_respond_info("Nozzle not hot enough!")}
                {action_respond_info("Nozzle heating...")}
                M109 S{printer.extruder.target}
            {% endif %}
        {% endif %}
        M117 Retracting...
        G91
        G1 E+25 F300
        G1 E-10 F1500
        G1 E-20 F600
        M400
        G4 P3000
        G1 E-50 F300 
        G90
        M400
        M117 Retract Finished
        M400
        {% if current_target_temp == 0 or printer.print_stats.state != "paused"%}
            M104 S0
        {% endif %}
    {% else %}
        {action_respond_info("Don't unload filament during printing!!!")}
    {% endif %}

[gcode_macro M109]
rename_existing: M99109
gcode:    
    {% set s = params.S|float %}    
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s-1} MAXIMUM={s+1}   
    {% endif %}
    
[gcode_macro M190]
rename_existing: M99190
gcode:    
    {% set s = params.S|float %}
    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}   
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s-1} MAXIMUM={s+1}  
    {% endif %}
    
[gcode_macro M600]
gcode:
    PAUSE STATE=filament_change

[gcode_macro COLD_PULL]
description: Процедура холодного протягивания для очистки экструдера
gcode:
    # Сохраняем текущее состояние принтера (позиция, моды движения и т.д.)
    SAVE_GCODE_STATE NAME=ColdPullState

    # Получаем тип материала из параметров (по умолчанию NYLON)
    {% set material = params.MATERIAL|default("NYLON")|string|upper %}
    
    # Температурные профили для разных материалов
    {% set materials = {
        'NYLON': {'hot_temp': 260, 'cold_temp': 50, 'pull_temp': 120, 'min_extrude_temp': 190},
        'PLA':   {'hot_temp': 250, 'cold_temp': 45, 'pull_temp': 100, 'min_extrude_temp': 160},
        'ABS':   {'hot_temp': 255, 'cold_temp': 50, 'pull_temp': 120, 'min_extrude_temp': 190},
        'PETG':  {'hot_temp': 250, 'cold_temp': 45, 'pull_temp': 100, 'min_extrude_temp': 180}
    } %}

    # ПРОВЕРКА ВЫБОРА МАТЕРИАЛА (Если материал не найден в словаре - выдаём ошибку)
    {% if material not in materials %}
        M117 ERROR: BAD MATERIAL!
        M118 ERROR: Valid materials: Nylon, PLA, ABS, PETG
        {action_raise_error("Invalid material")}
    {% endif %}

    # НАСТРОЙКА ТЕМПЕРАТУР
	# Получаем температуры из параметров или используем значения по умолчанию для материала
    {% set hot_temp = params.HOT_TEMP|default('')|int %}
    {% set cold_temp = params.COLD_TEMP|default('')|int %}
    {% set pull_temp = params.PULL_TEMP|default('')|int %}
    {% set min_extrude_temp = params.MIN_EXTRUDE_TEMP|default('')|int %}
    
    # УСТАНОВКА ДЕФОЛТНЫХ ЗНАЧЕНИЙ ТЕМПЕРАТУР (если параметры не заданы)
    {% set hot_temp = (hot_temp if hot_temp > 0 else materials.get(material).hot_temp)|int %}
    {% set cold_temp = (cold_temp if cold_temp > 0 else materials.get(material).cold_temp)|int %}
    {% set pull_temp = (pull_temp if pull_temp > 0 else materials.get(material).pull_temp)|int %}
    {% set min_extrude_temp = (min_extrude_temp if min_extrude_temp > 0 else materials.get(material).min_extrude_temp)|int %}

    # ПАРАМЕТРЫ ДВИЖЕНИЙ 
    {% set pull_speed = params.PULL_SPEED|default(10)|int %}        # мм/с
    {% set clean_length = params.CLEAN_LENGTH|default(25)|int %}    # мм
    {% set extrude_speed = params.EXTRUDE_SPEED|default(2)|float %} # мм/с
    {% set stuff_length = params.STUFF_LENGTH|default(0.5)|float %} # мм

    # ГЕНЕРАЦИЯ ТЕМПЕРАТУРНЫХ ТОЧЕК
	# Создаём два списка температурных точек:
    # - stuff_points: для подталкивания филамента при охлаждении
    # - cool_points: для визуализации процесса остывания	
    {% set ns = namespace(stuff_points=[], cool_points=[]) %}
    {% for temp in range(hot_temp + 1, cold_temp - 1, -1) %}
        {% if temp % 10 == 0 %}
            {% if temp > min_extrude_temp %}
                {% set ns.stuff_points = ns.stuff_points + [temp] %}
            {% elif temp < min_extrude_temp %}
                {% set ns.cool_points = ns.cool_points + [temp] %}
            {% endif %}
        {% endif %}
    {% endfor %}

    # ЭТАП 1: ПРОГРЕВ
    M117 Cold Pull: {material}
    M118 Starting Cold Pull: pull_temp={pull_temp} C

    M117 Heating to {hot_temp} C
    M118 Heating extruder to {hot_temp}°C
    SET_HEATER_TEMPERATURE HEATER="extruder" TARGET={hot_temp}
    TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={hot_temp - 2} MAXIMUM={hot_temp + 2}

    # ЭТАП 2: ЗАПОЛНЯЕМ ХОТЕНД 
    M117 CLEANING NOZZLE
    M118 Cleaning nozzle tip with {clean_length}mm
    G91
    G1 E{clean_length} F{extrude_speed * 60}
    G90

    # ЭТАП 3: ОХЛАЖДЕНИЕ
    M117 COOLING START
    M118 Cooling to {cold_temp}°C...
    SET_HEATER_TEMPERATURE HEATER="extruder" TARGET={cold_temp}
    M106 S255  # Вентилятор на максимум

    # ЭТАП 4: ПОДТАЛКИВАНИЕ ПРИ ОХЛАЖДЕНИИ (УПЛОТНЯЕМ)
    {% for temp in ns.stuff_points %}
        TEMPERATURE_WAIT SENSOR="extruder" MAXIMUM={temp}
        M117 Stuffing @ {temp} C
        M118 Stuffing: {stuff_length}mm
        G91
        G1 E{stuff_length} F{extrude_speed * 60}
        G90
    {% endfor %}

    # ЭТАП 5: ФИНАЛЬНОЕ ОХЛАЖДЕНИЕ
    M117 Cooling to {cold_temp} C
    M118 Waiting for {cold_temp}°C...
    {% for temp in ns.cool_points %}
        TEMPERATURE_WAIT SENSOR="extruder" MAXIMUM={temp}
        M117 Now {temp} C
        M118 Nozzle at {temp}°C
    {% endfor %}
    # Ожидание достижения минимальной температуры для протягивания
	TEMPERATURE_WAIT SENSOR="extruder" MAXIMUM={cold_temp}

    # ЭТАП 6: ПОДГОТОВКА К ПРОТЯГИВАНИЮ 
    M107  #Выключение вентилятора
    M117 Reheat to {pull_temp} C
    M118 Rewarming to {pull_temp}°C
    SET_HEATER_TEMPERATURE HEATER="extruder" TARGET={pull_temp}
    TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={pull_temp - 10}
    
    # СИГНАЛ ПОЛЬЗОВАТЕЛЮ
    BEEP  #Звуковой сигнал
    M117 >READY TO PULL<
    M118 >>>>>GET READY TO PULL<<<<<
    # Финальное ожидание точной температуры
    TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={pull_temp}
    M117 ! PULL NOW !
    M118 !!! PULL NOW !!!
    
    # ЭТАП 7: АВТОМАТИЧЕСКАЯ ПРОТЯЖКА 
    G91
    G1 E-100 F{pull_speed * 60}
    G90

    # ЭТАП 8: ЗАВЕРШЕНИЕ
    M117 PULL SUCCESS
    M118 Cold pull success: check filament tip
    SET_HEATER_TEMPERATURE HEATER="extruder" TARGET=0
    RESTORE_GCODE_STATE NAME=ColdPullState  # Восстановление состояния

