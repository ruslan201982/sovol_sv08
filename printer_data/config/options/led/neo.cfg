# Основная конфигурация светодиодов Neopixel для StealthBurner
[neopixel sb_leds]
pin: EBBCan:PD3                    # Пин подключения светодиодов (обязательный параметр)
chain_count: 3                     # Количество светодиодов в цепи (всего 3 светодиода)
color_order: GRBW                  # Порядок цветов: Green, Red, Blue, White
initial_RED: 1.0                   # Начальный цвет: красный компонент
initial_GREEN: 0.0                 # Начальный цвет: зеленый компонент
initial_BLUE: 1.0                  # Начальный цвет: синий компонент (фиолетовый при запуске)
initial_WHITE: 0.0                 # Начальный цвет: белый компонент

# Макрос для хранения переменных и цветовых настроек
[gcode_macro _sb_vars]
# Пользовательские настройки для статусных светодиодов StealthBurner
variable_colors: {
        'logo': { # Цвета для состояний логотипа
            'busy': {'r': 0.4, 'g': 0.0, 'b': 0.0, 'w': 0.0},           # Темно-красный: занят
            'cleaning': {'r': 0.0, 'g': 0.02, 'b': 0.5, 'w': 0.0},      # Синий: очистка
            'calibrating_z': {'r': 0.8, 'g': 0., 'b': 0.35, 'w': 0.0},  # Пурпурный: калибровка Z
            'heating': {'r': 0.3, 'g': 0.18, 'b': 0.0, 'w': 0.0},       # Оранжевый: нагрев
            'homing': {'r': 0.0, 'g': 0.6, 'b': 0.2, 'w': 0.0},         # Зеленый: парковка
            'leveling': {'r': 0.5, 'g': 0.1, 'b': 0.4, 'w': 0.0},       # Фиолетовый: выравнивание
            'meshing': {'r': 0.2, 'g': 1.0, 'b': 0.0, 'w': 0.0},        # Ярко-зеленый: сетка стола
            'off': {'r': 0.0, 'g': 0.0, 'b': 0.0, 'w': 0.0},            # Выключено
            'printing': {'r': 1.0, 'g': 0.0, 'b': 0.0, 'w': 0.0},       # Красный: печать
            'standby': {'r': 0.01, 'g': 0.01, 'b': 0.01, 'w': 0.1},     # Тусклый белый: режим ожидания
        },
        'nozzle': { # Цвета для состояний сопла
            'heating': {'r': 0.8, 'g': 0.35, 'b': 0.0, 'w':0.0},        # Оранжевый: нагрев
            'off': {'r': 0.0, 'g': 0.0, 'b': 0.0, 'w': 0.0},            # Выключено
            'on': {'r': 0.8, 'g': 0.8, 'b': 0.8, 'w':1.0},              # Белый: включено
            'standby': {'r': 0.6, 'g': 0.0, 'b': 0.0, 'w':0.0},         # Красный: ожидание
        },
        'thermal': { # Термальные цвета (не используются в основных макросах)
            'hot': {'r': 1.0, 'g': 0.0, 'b': 0.0, 'w': 0.0},            # Красный: горячо
            'cold': {'r': 0.3, 'g': 0.0, 'b': 0.3, 'w': 0.0}            # Фиолетовый: холодно
        }
    }
variable_logo_led_name:         "sb_leds"          # Имя цепи светодиодов для логотипа
variable_logo_idx:              "1"                # Индекс светодиода логотипа (второй в цепи)
variable_nozzle_led_name:       "sb_leds"          # Имя цепи светодиодов для сопла
variable_nozzle_idx:            "2,3"              # Индексы светодиодов сопла (третий и четвертый в цепи)
gcode:
    # Эта секция обязательна. Не удалять.

# Базовый макрос для установки цвета светодиодов
[gcode_macro _set_sb_leds]
gcode:
    {% set red = params.RED|default(0)|float %}          # Красный компонент (0.0-1.0)
    {% set green = params.GREEN|default(0)|float %}      # Зеленый компонент (0.0-1.0)
    {% set blue = params.BLUE|default(0)|float %}        # Синий компонент (0.0-1.0)
    {% set white = params.WHITE|default(0)|float %}      # Белый компонент (0.0-1.0)
    {% set led = params.LED|string %}                    # Имя светодиода
    {% set idx = (params.IDX|string).split(',') %}       # Список индексов светодиодов
    {% set transmit_last = params.TRANSMIT|default(1) %} # Отправлять команду светодиодам

    # Установка цвета для каждого светодиода в списке
    {% for led_index in idx %}
        {% set transmit=transmit_last if loop.last else 0 %} # Отправлять только для последнего светодиода
        set_led led={led} red={red} green={green} blue={blue} white={white} index={led_index} transmit={transmit}
    {% endfor %}

# Макрос для установки цвета по имени из переменных
[gcode_macro _set_sb_leds_by_name]
gcode:
    {% set leds_name = params.LEDS %}                    # Имя группы светодиодов ('logo' или 'nozzle')
    {% set color_name = params.COLOR %}                  # Имя цвета из переменных
    {% set color = printer["gcode_macro _sb_vars"].colors[leds_name][color_name] %} # Получение цвета
    {% set led = printer["gcode_macro _sb_vars"][leds_name + "_led_name"] %} # Имя цепи светодиодов
    {% set idx = printer["gcode_macro _sb_vars"][leds_name + "_idx"] %}      # Индексы светодиодов
    {% set transmit = params.TRANSMIT|default(1) %}      # Флаг отправки команды

    _set_sb_leds led={led} red={color.r} green={color.g} blue={color.b} white={color.w} idx="{idx}" transmit={transmit}

# Специализированные макросы для логотипа
[gcode_macro _set_logo_leds]
gcode:
    {% set red = params.RED|default(0)|float %}
    {% set green = params.GREEN|default(0)|float %}
    {% set blue = params.BLUE|default(0)|float %}
    {% set white = params.WHITE|default(0)|float %}
    {% set led = printer["gcode_macro _sb_vars"].logo_led_name %}
    {% set idx = printer["gcode_macro _sb_vars"].logo_idx %}
    {% set transmit=params.TRANSMIT|default(1) %}

    _set_sb_leds led={led} red={red} green={green} blue={blue} white={white} idx="{idx}" transmit={transmit}

# Специализированные макросы для сопла
[gcode_macro _set_nozzle_leds]
gcode:
    {% set red = params.RED|default(0)|float %}
    {% set green = params.GREEN|default(0)|float %}
    {% set blue = params.BLUE|default(0)|float %}
    {% set white = params.WHITE|default(0)|float %}
    {% set led = printer["gcode_macro _sb_vars"].nozzle_led_name %}
    {% set idx = printer["gcode_macro _sb_vars"].nozzle_idx %}
    {% set transmit=params.TRANSMIT|default(1) %}

    _set_sb_leds led={led} red={red} green={green} blue={blue} white={white} idx="{idx}" transmit={transmit}

# Макросы базового управления
[gcode_macro set_logo_leds_off]
gcode:
    {% set transmit=params.TRANSMIT|default(1) %}
    _set_logo_leds red=0 blue=0 green=0 white=0 transmit={transmit}

[gcode_macro set_nozzle_leds_on]
gcode:
    {% set transmit=params.TRANSMIT|default(1) %}
    _set_sb_leds_by_name leds="nozzle" color="on" transmit={transmit}

[gcode_macro set_nozzle_leds_off]
gcode:
    {% set transmit=params.TRANSMIT|default(1) %}
    _set_sb_leds_by_name leds="nozzle" color="off" transmit={transmit}

# СТАТУСНЫЕ МАКРОСЫ для использования в других макросах
[gcode_macro status_off]
gcode:
    set_logo_leds_off transmit=0
    set_nozzle_leds_off

[gcode_macro status_ready]
gcode:
    _set_sb_leds_by_name leds="logo" color="standby" transmit=0
    _set_sb_leds_by_name leds="nozzle" color="standby" transmit=1

[gcode_macro status_busy]
gcode:
    _set_sb_leds_by_name leds="logo" color="busy" transmit=0
    set_nozzle_leds_on

[gcode_macro status_heating]
gcode:
    _set_sb_leds_by_name leds="logo" color="heating" transmit=0
    _set_sb_leds_by_name leds="nozzle" color="heating" transmit=1

[gcode_macro status_leveling]
gcode:
    _set_sb_leds_by_name leds="logo" color="leveling" transmit=0
    set_nozzle_leds_on

[gcode_macro status_homing]
gcode:
    _set_sb_leds_by_name leds="logo" color="homing" transmit=0
    set_nozzle_leds_on

[gcode_macro status_cleaning]
gcode:
    _set_sb_leds_by_name leds="logo" color="cleaning" transmit=0
    set_nozzle_leds_on

[gcode_macro status_meshing]
gcode:
    _set_sb_leds_by_name leds="logo" color="meshing" transmit=0
    set_nozzle_leds_on

[gcode_macro status_calibrating_z]
gcode:
    _set_sb_leds_by_name leds="logo" color="calibrating_z" transmit=0
    set_nozzle_leds_on

[gcode_macro status_printing]
gcode:
    _set_sb_leds_by_name leds="logo" color="printing" transmit=0
    set_nozzle_leds_on

# Специальный макрос для мигания при паузе
[gcode_macro status_paused]
description: Blinking red/yellow pattern for pause state
gcode:
    {% set logo_led = printer["gcode_macro _sb_vars"].logo_led_name %}     # Светодиод логотипа
    {% set logo_idx = printer["gcode_macro _sb_vars"].logo_idx %}          # Индекс логотипа
    {% set nozzle_led = printer["gcode_macro _sb_vars"].nozzle_led_name %} # Светодиод сопла
    {% set nozzle_idx = printer["gcode_macro _sb_vars"].nozzle_idx %}      # Индекс сопла
    
    ; Мигающий режим - красный и желтый попеременно
    {% if printer.pause_resume.is_paused %}
        ; Первое состояние - красный
        _set_sb_leds led={logo_led} red=1.0 green=0.0 blue=0.0 white=0.0 idx="{logo_idx}" transmit=0
        _set_sb_leds led={nozzle_led} red=1.0 green=0.0 blue=0.0 white=0.0 idx="{nozzle_idx}" transmit=1
        G4 P1000  ; Пауза 1 секунда
        
        ; Второе состояние - желтый (красный + зеленый)
        _set_sb_leds led={logo_led} red=1.0 green=0.5 blue=0.0 white=0.0 idx="{logo_idx}" transmit=0
        _set_sb_leds led={nozzle_led} red=1.0 green=0.5 blue=0.0 white=0.0 idx="{nozzle_idx}" transmit=1
        G4 P1000  ; Пауза 1 секунда
        
        ; Перезапускаем макрос для непрерывного мигания
        UPDATE_DELAYED_GCODE ID=status_paused DURATION=0.1
    {% else %}
        ; Если пауза закончилась, отменяем мигание
        UPDATE_DELAYED_GCODE ID=status_paused DURATION=0
    {% endif %}

# Отложенный GCODE для непрерывного мигания при паузе
[delayed_gcode status_paused]
initial_duration: 1.0    # Начальная задержка 1 секунда
gcode:
    STATUS_PAUSED         # Повторный вызов макроса паузы