#pid_Kp: 2
#pid_Ki: .5
#pid_Kd: 0.25
#pid_deriv_time: 5.0

[bed_screws]
screw1: 175,175
screw1_name: Centre
screw2: 13,13
screw2_name: FrontLeft
screw3: 176,13
screw3_name: FrontMid
screw4: 338,13
screw4_name: FrontRight
screw5: 13,176
screw5_name: MidLeft
screw6: 338,176
screw6_name: Mid Right
screw7: 13,338
screw7_name: BackLeft
screw8: 176,338
screw8_name: BackMid
screw9: 338,338
screw9_name: BackRight
horizontal_move_z: 2
speed: 400
probe_speed: 3

[screws_tilt_adjust]
screw1: 191,166
screw1_name: Centre
screw2: 28,3
screw2_name: FrontLeft
screw3: 191,3
screw3_name: FrontMid
screw4: 353,3
screw4_name: FrontRight
screw5: 28,166
screw5_name: MidLeft
screw6: 353,166
screw6_name: Mid Right
screw7: 28,328
screw7_name: BackLeft
screw8: 191,328
screw8_name: BackMid
screw9: 353,328
screw9_name: BackRight
horizontal_move_z: 3
speed: 400
screw_thread: CCW-M4

[save_variables]
filename = ~/printer_data/config/saved_variables.cfg

