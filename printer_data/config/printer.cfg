# [heater_fan hotend_fan]      
# pin: extra_mcu:PA6   
# max_power: 1.0               
# kick_start_time: 0.5         
# heater: extruder             
# heater_temp: 50              
# tachometer_pin:extra_mcu:PA1
# tachometer_ppr: 1
# tachometer_poll_interval: 0.0013

[gcode_arcs]                       
resolution: 1.0                    

[idle_timeout]
gcode: _IDLE_TIMEOUT
timeout: 1200

[temperature_sensor mcu_temp]         
sensor_type: temperature_mcu
min_temp:0
max_temp:100

[temperature_sensor Host_temp]     
sensor_type: temperature_host
min_temp: 0
max_temp: 110

# [temperature_sensor Toolhead_Temp]
# sensor_type: temperature_mcu
# sensor_mcu: extra_mcu

[pause_resume]

[exclude_object]

# [adxl345]
# cs_pin:extra_mcu:PB12

[resonance_tester]
accel_chip: adxl345
probe_points:
    175, 175, 50  # an example175 Y175 Z30
accel_per_hz:75
min_freq:10
max_freq:130

[input_shaper]
shaper_type_x = mzv
shaper_freq_x = 66.4
shaper_type_y = mzv  
shaper_freq_y = 49.4
damping_ratio_x = 0.066
damping_ratio_y = 0.045

