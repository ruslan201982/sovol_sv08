#pid_Kp: 2
#pid_Ki: .5
#pid_Kd: 0.25
#pid_deriv_time: 5.0

[bed_screws]
screw1: 175, 196.6        # Centre (175+21.6=196.6)
screw1_name: Centre
screw2: 13, 34.6          # FrontLeft (13+21.6=34.6)
screw2_name: FrontLeft
screw3: 176, 34.6         # FrontMid (176+21.6=34.6)
screw3_name: FrontMid
screw4: 338, 34.6         # FrontRight (338+21.6=34.6)
screw4_name: FrontRight
screw5: 13, 197.6         # MidLeft (176+21.6=197.6)
screw5_name: MidLeft
screw6: 338, 197.6        # MidRight
screw6_name: MidRight
screw7: 13, 359.6         # BackLeft (338+21.6=359.6)
screw7_name: BackLeft
screw8: 176, 359.6        # BackMid
screw8_name: BackMid
screw9: 338, 359.6        # BackRight
screw9_name: BackRight
horizontal_move_z: 2
speed: 400
probe_speed: 3

[screws_tilt_adjust]
# === ПЕРЕДНИЙ РЯД (Y=0 для сопла) ===
screw1: 17.5, 21.6        # FrontLeft
screw1_name: FrontLeft
screw2: 180, 21.6         # FrontMid  
screw2_name: FrontMid
screw3: 342.5, 21.6       # FrontRight
screw3_name: FrontRight
# === СРЕДНИЙ РЯД (Y=170.5 для сопла) ===
screw4: 17.5, 192.1       # MidLeft (170.5+21.6=192.1)
screw4_name: MidLeft
screw5: 180, 192.1        # Center
screw5_name: Center
screw6: 342.5, 192.1      # MidRight
screw6_name: MidRight
# === ЗАДНИЙ РЯД (Y=338 для сопла, было 341) ===
screw7: 17.5, 359.6       # BackLeft (338+21.6=359.6)
screw7_name: BackLeft
screw8: 180, 359.6        # BackMid
screw8_name: BackMid
screw9: 342.5, 359.6      # BackRight
screw9_name: BackRight
horizontal_move_z: 3
speed: 400
screw_thread: CCW-M4

