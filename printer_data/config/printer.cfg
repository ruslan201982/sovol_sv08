#pid_deriv_time: 5.0

[bed_screws]
screw1: 175,175
screw1_name: Centre
screw2: 13,13
screw2_name: FrontLeft
screw3: 176,13
screw3_name: FrontMid
screw4: 338,13
screw4_name: FrontRight
screw5: 13,176
screw5_name: MidLeft
screw6: 338,176
screw6_name: Mid Right
screw7: 13,338
screw7_name: BackLeft
screw8: 176,338
screw8_name: BackMid
screw9: 338,338
screw9_name: BackRight
horizontal_move_z: 2
speed: 400
probe_speed: 3

[screws_tilt_adjust]
screw1: 180.5,150       # Центр: 179.5+1=180.5
screw1_name: Center
screw2: 17.5,0          # FrontLeft: 16.5+1=17.5
screw2_name: FrontLeft
screw3: 180.5,0         # FrontMid: 179.5+1=180.5
screw3_name: FrontMid
screw4: 342.5,0         # FrontRight: 341.5+1=342.5
screw4_name: FrontRight
screw5: 17.5,150        # MidLeft: 16.5+1=17.5
screw5_name: MidLeft
screw6: 342.5,150       # MidRight: 341.5+1=342.5
screw6_name: MidRight
screw7: 17.5,312        # BackLeft: 16.5+1=17.5
screw7_name: BackLeft
screw8: 180.5,312       # BackMid: 179.5+1=180.5
screw8_name: BackMid
screw9: 342.5,312       # BackRight: 341.5+1=342.5
screw9_name: BackRight
horizontal_move_z: 3
speed: 400
screw_thread: CCW-M4

