screw1: 17.5, 0
screw1_name: FrontLeft
screw2: 180, 0
screw2_name: FrontMid
screw3: 342.5, 0
screw3_name: FrontRight
# === СРЕДНИЙ РЯД ===
screw4: 17.5, 148.9    # 170.5 - 21.6 = 148.9
screw4_name: MidLeft
screw5: 180, 148.9
screw5_name: Center
screw6: 342.5, 148.9
screw6_name: MidRight
# === ЗАДНИЙ РЯД (сдвинут на 8 мм ближе к Y=0) ===
# Винты: Y=333 для сопла (было 341)
# Для зонда: 333 - 21.6 = 311.4
screw7: 17.5, 311.4
screw7_name: BackLeft
screw8: 180, 311.4
screw8_name: BackMid
screw9: 342.5, 311.4
screw9_name: BackRight
horizontal_move_z: 2
speed: 400
probe_speed: 3

[screws_tilt_adjust]
# === ПЕРЕДНИЙ РЯД (исключение - указываем Y=0) ===
screw1: 17.5, 0
screw1_name: FrontLeft
screw2: 180, 0
screw2_name: FrontMid
screw3: 342.5, 0
screw3_name: FrontRight
# === СРЕДНИЙ РЯД ===
screw4: 17.5, 148.9
screw4_name: MidLeft
screw5: 180, 148.9
screw5_name: Center
screw6: 342.5, 148.9
screw6_name: MidRight
# === ЗАДНИЙ РЯД (сдвинут на 8 мм) ===
screw7: 17.5, 311.4
screw7_name: BackLeft
screw8: 180, 311.4
screw8_name: BackMid
screw9: 342.5, 311.4
screw9_name: BackRight
horizontal_move_z: 3
speed: 400
screw_thread: CCW-M4

